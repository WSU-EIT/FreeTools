    <script type="text/javascript">
        let cookiePrefix = "helpdesk_";
        var dotNetHelper;

        $(function () {
            SetPreferredColorScheme("");

            window.addEventListener("keyup", function (event) {
                if(dotNetHelper != undefined && dotNetHelper != null) {
                    if (event.code != undefined && event.code != null){
                        //console.log("Keyup Event", event);
                        dotNetHelper.invokeMethodAsync(
                            "OnKeyUp",
                            event.key,
                            event.code,
                            event.shiftKey,
                            event.ctrlKey,
                            event.altKey,
                            event.metaKey,
                            event.location,
                            event.type
                        );
                    }
                }
            });
        });

        function ConsoleLog(message, objects) {
            if(objects != undefined && objects != null) {
                if (message != undefined && message != null && message != "") {
                    console.log(message, objects);
                } else {
                    console.log(objects);
                }
            } else if (message != undefined && message != null && message != "") {
                console.log(message);
            }
        }

        function CookieRead(cname) {
            let name = cookiePrefix + cname + "=";
            let decodedCookie = decodeURIComponent(document.cookie);
            let ca = decodedCookie.split(';');

            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];

                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }

                if (c.indexOf(name) == 0) {
                    return c.substring(name.length, c.length);
                }
            }

            return "";
        }

        function CookieWrite(name, value, days) {
            var expires;

            if (days == undefined || days == null || days < 1) {
                days = 14;
            }

            if (days) {
                var date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toGMTString();
            } else {
                expires = "";
            }

            document.cookie = cookiePrefix + name + "=" + value + expires + "; path=/";
        }

        function CopyToClipboard(value) {
            navigator.clipboard.writeText(value);
        }

        function DelayedFocus(element) {
            setTimeout(() => DelayedFocusInternal(element, 0), 0);
        }

        function DelayedFocusInternal(element, safety) {
            if (safety > 20) { return; }
            safety++;

            if ($("#" + element).is(":visible") == true) {
                // See if the element is a <div>. If so, find the first child that is an input.
                if ($("#" + element).is("div")) {
                    var trigger = "focus";

                    // First, see if this is a Radzen input.
                    var input = $("#" + element).find('.rz-inputtext').filter(":visible:first");
                    if (input != undefined && input != null) {
                        // This is a radzen component, so we will trigger a click.
                        trigger = "click";
                    } else {
                        // Find a regular input element.
                        input = $("#" + element).find('input,textarea,select').filter(":visible:first");
                    }
                    
                    if (input != null) {
                        input.trigger(trigger);
                    }
                } else {
                    $("#" + element).trigger("focus");
                }
            } else {
                setTimeout(() => DelayedFocusInternal(element, safety), 20);
            }
        }

        function DelayedSelect(element) {
            setTimeout(() => DelayedSelectInternal(element, 0), 0);
        }

        function DelayedSelectInternal(element, safety) {
            if (safety > 20) { return; }
            safety++;

            if ($("#" + element).is(":visible") == true) {
                $("#" + element).trigger("select");
            } else {
                setTimeout(() => DelayedSelectInternal(element, safety), 20);
            }
        }

        async function DownloadFileFromStream(fileName, contentStreamReference) {
            const arrayBuffer = await contentStreamReference.arrayBuffer();
            const blob = new Blob([arrayBuffer]);
            const url = URL.createObjectURL(blob);
            const anchorElement = document.createElement('a');
            anchorElement.href = url;
            anchorElement.download = fileName ?? '';
            anchorElement.click();
            anchorElement.remove();
            URL.revokeObjectURL(url);
        }

        function EnsureElementIsOnScreen(element, useMarginOffset) {
            setTimeout(() => EnsureElementIsOnScreenInternal(element, useMarginOffset, 0), 0);
        }

        function EnsureElementIsOnScreenInternal(element, useMarginOffset, safety) {
            if (safety > 20) { return; }
            safety++;

            if ($("#" + element).is(":visible") == true) {
                // Get the position of the element.
                var el = document.getElementById(element);
                if (!el) {
                    return;
                }

                var rect = el.getBoundingClientRect();
                var top = rect.top;
                var left = rect.left;
                var right = rect.right;
                var bottom = rect.bottom;
                var width = rect.width;
                var height = rect.height;

                var innerWidth = window.innerWidth;
                var innerHeight = window.innerHeight;

                console.log("rect", rect);
                console.log("Top", top, "Left", left, "Right", right, "Bottom", bottom, "innerWidth", innerWidth, "innerHeight", innerHeight);

                var reposition = false;

                if (useMarginOffset != undefined && useMarginOffset != null && useMarginOffset == true) {
                    if (right > innerWidth) {
                        el.style.right = "10px";
                    } else if (left < 0) {
                        el.style.left = "10px";
                    }
                } else {
                    if (right > innerWidth) {
                        left = innerWidth - width - 10;
                        reposition = true;
                    }

                    if (left < 0) {
                        left = 10;
                        reposition = true;
                    }

                    if (top < 70) {
                        top = 70;
                        reposition = true;
                    }

                    if (reposition) {
                        el.style.left = left + 'px';
                        el.style.top = top + 'px';
                    }
                }
            } else {
                setTimeout(() => EnsureElementIsOnScreenInternal(element, safety), 20);
            }
        }

        function HideMenu() {
            let bsOffcanvasUserMenu = bootstrap.Offcanvas.getInstance("#offcanvasUserMenu");
            if (bsOffcanvasUserMenu != undefined && bsOffcanvasUserMenu != null && bsOffcanvasUserMenu._isShown) {
                bsOffcanvasUserMenu.hide();
            }

            let bsOffcanvasQuickActionMenu = bootstrap.Offcanvas.getInstance("#offcanvasQuickAction");
            if (bsOffcanvasQuickActionMenu != undefined && bsOffcanvasQuickActionMenu != null && bsOffcanvasQuickActionMenu._isShown) {
                bsOffcanvasQuickActionMenu.hide();
            }
        }

        function HighlightElementByClass(c) {
            $("." + c).off("click");
            $("." + c).on("click", function () {
                RemoveElementHighlightByClass(c);
            });
            $("." + c).addClass("highlight");

            $("." + c).fadeOut(200)
                .fadeIn(200)
                .fadeOut(200)
                .fadeIn(200)
                .fadeOut(200)
                .fadeIn(200);
        }

        function InsertAtCursor(field, value) {
            var $txt = jQuery("#" + field);
            var caretPos = $txt[0].selectionStart;
            var textAreaTxt = $txt.val();
            $txt.val(textAreaTxt.substring(0, caretPos) + value + textAreaTxt.substring(caretPos));
        }

        function Loaded() {
            $("#body-element").removeClass("loading");
        }

        function NavigateTo(url) {
            window.location.href = url;
        }

        function ReloadCurrentPage() {
            window.location.href = window.location.href;
        }

        function RemoveElementHighlightByClass(c) {
            $("." + c).off("click");
            $("." + c).removeClass("highlight");
        }

        function ScrollToTop() {
            window.scrollTo(0, 0);
        }

        function SetDotNetHelper(value) {
            dotNetHelper = value;
        }

        function SetPreferredColorScheme(preferred) {
            if (preferred == undefined || preferred == null) {
                preferred = "";
            }

            if (preferred == "") {
                var colorScheme = getComputedStyle(document.body, ':after').content;
                var preferred = colorScheme.indexOf("dark") > -1 ? "dark" : "light";
            }

            var setTheme = "";
            var setClass = "";

            if (preferred == "dark") {
                setTheme = "dark";
                setClass = "dark";
            } else if (preferred == "light") {
                setTheme = "";
                setClass = "light";
            } else {
                setTheme = preferred;
                setClass = preferred;
            }

            // Only update if this has changed.
            if ($("#body-element").hasClass(setClass)) {
                // Already up-to-date
            }else{
                $("#body-element").attr("data-bs-theme", setTheme);
                $("#body-element").removeClass();
                $("#body-element").addClass(setClass);
            }
        }

        function ShowQuickActionMenu() {
            HideMenu();

            const bsOffcanvasQuickActionMenu = new bootstrap.Offcanvas("#offcanvasQuickAction");
            if (bsOffcanvasQuickActionMenu != undefined && bsOffcanvasQuickActionMenu != null) {
                bsOffcanvasQuickActionMenu.show();
            }
        }

        function SetElementValue(id, value) {
            $("#" + id).val(value);
        }
    </script></body></html>
